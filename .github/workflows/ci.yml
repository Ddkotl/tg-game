name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

  lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint

  build:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build

  test:
    runs-on: ubuntu-latest
    needs: install
    env:
      DATABASE_URL: postgresql://tg_game:password@localhost:5432/tg_game
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: tg_game
          POSTGRES_PASSWORD: password
          POSTGRES_DB: tg_game
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: cd apps/back && pnpm prisma generate
      - name: Run database migrations
        run: cd apps/back && pnpm prisma migrate deploy
      - name: Run tests
        run: pnpm test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build back Docker image
        run: docker build -f apps/back/Dockerfile -t tg-game-back .
      - name: Build front Docker image
        run: docker build -f apps/front/Dockerfile -t tg-game-front .
